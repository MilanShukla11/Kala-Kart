  <script>
    const backendUrl = window.location.origin;

    async function fetchPendingProducts() {
      try {
        const response = await fetch(`${backendUrl}/api/admin/pending-products`);
        const products = await response.json();
        
        const listContainer = document.getElementById('pending-list');
        listContainer.innerHTML = ''; 

        if(products.length === 0) {
            listContainer.innerHTML = '<p class="text-green-600 font-semibold text-lg col-span-2">All caught up! No pending approvals.</p>';
            return;
        }

        products.forEach(product => {
          const card = document.createElement('div');
          // Changed layout to a flexbox that handles images nicely
          card.className = 'bg-white p-4 rounded-lg shadow border border-gray-200 flex flex-col md:flex-row gap-6 items-start';
          
          // Use the uploaded image, or a fallback if something broke
          const imgUrl = product.image_url || 'https://via.placeholder.com/150?text=No+Image';

          card.innerHTML = `
            <img src="${imgUrl}" alt="Product Image" class="w-full md:w-40 h-40 object-cover rounded border bg-gray-50">
            
            <div class="flex-grow">
              <h2 class="text-2xl font-bold text-gray-800">${product.title}</h2>
              <p class="text-sm font-semibold text-amber-600 mb-2">
                Crafted by: <span class="text-gray-800">${product.artisan_name || 'Unknown'}</span> from <span class="text-gray-800">${product.village || 'Unknown Region'}</span>
              </p>
              <p class="text-gray-600 mb-3 bg-gray-50 p-2 rounded text-sm">${product.description}</p>
              <p class="text-xl font-bold text-green-700">₹${product.price}</p>
            </div>

            <div class="flex flex-col gap-3 w-full md:w-auto mt-4 md:mt-0">
              <button onclick="approveProduct(${product.id})" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded font-bold shadow transition-colors">
                Approve
              </button>
              <button onclick="rejectProduct(${product.id})" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded font-bold shadow transition-colors">
                Reject
              </button>
            </div>
          `;
          listContainer.appendChild(card);
        });
      } catch (error) {
        console.error('Error fetching products:', error);
      }
    }

    async function approveProduct(id) {
      try {
        const response = await fetch(`${backendUrl}/api/admin/approve-product/${id}`, { method: 'PUT' });
        if(response.ok) {
          fetchPendingProducts(); 
        }
      } catch (error) {
        console.error('Error approving:', error);
      }
    }

    // New Reject Function
    async function rejectProduct(id) {
      if(!confirm("Are you sure you want to reject and delete this product?")) return;
      
      try {
        const response = await fetch(`${backendUrl}/api/admin/reject-product/${id}`, { method: 'DELETE' });
        if(response.ok) {
          fetchPendingProducts(); 
        }
      } catch (error) {
        console.error('Error rejecting:', error);
      }
    }

    fetchPendingProducts();

    // Simple Route Protection
  const currentRole = localStorage.getItem('userRole');
  // If not logged in, or if a buyer tries to access NGO/Artisan pages, kick them out
  if (!currentRole || currentRole === 'buyer') {
    window.location.href = '/login.html';
  }

  // Add a quick logout button to the navbar via JS
  document.querySelector('.space-x-4').innerHTML += `
    <button onclick="logout()" class="text-sm font-medium hover:underline text-red-200 bg-red-800 px-4 py-2 rounded shadow ml-2">Logout</button>
  `;

  function logout() {
    localStorage.removeItem('userRole');
    window.location.href = '/login.html';
  }
  </script>
